<svg viewBox="0 0 1060 620" xmlns="http://www.w3.org/2000/svg"
     font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#555"/>
    </marker>
    <marker id="ah_b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#0284c7"/>
    </marker>
    <marker id="ah_b2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#0369a1"/>
    </marker>
    <linearGradient id="gGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a7f3d0"/><stop offset="100%" style="stop-color:#34d399"/>
    </linearGradient>
    <linearGradient id="gPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ede9fe"/><stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
    <linearGradient id="gBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0f2fe"/><stop offset="100%" style="stop-color:#7dd3fc"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/></filter>
  </defs>

  <!-- background -->
  <rect width="1060" height="620" rx="16" fill="#ffffff"/>
  <rect width="1060" height="4" fill="#0ea5e9"/>
  <rect width="1060" height="56" fill="#f0f9ff"/>
  <text x="28" y="32" font-size="22" font-weight="700" fill="#0c4a6e">BLIP</text>
  <text x="80" y="32" font-size="22" font-weight="400" fill="#475569"> — Three Objectives, One Shared Image Encoder</text>
  <text x="28" y="50" font-size="12" fill="#94a3b8">ITC (contrastive) + ITM (image-text matching) + LM (captioning decoder) — trained jointly</text>

  <!-- ──────────────────────────────────────────
       ViT IMAGE ENCODER  (left column)
  ────────────────────────────────────────── -->
  <rect x="32" y="80" width="160" height="300" rx="12" fill="url(#gGreen)" stroke="#059669" stroke-width="2" filter="url(#sh)"/>
  <text x="112" y="116" font-size="13" font-weight="700" fill="#064e3b" text-anchor="middle">ViT</text>
  <text x="112" y="134" font-size="13" font-weight="700" fill="#064e3b" text-anchor="middle">Image Encoder</text>
  <!-- N× label -->
  <text x="44" y="158" font-size="11" fill="#065f46">N×</text>
  <!-- mini transformer block stack -->
  <rect x="56" y="150" width="112" height="30" rx="6" fill="white" fill-opacity="0.6" stroke="#34d399" stroke-width="1"/>
  <text x="112" y="170" font-size="11" fill="#065f46" text-anchor="middle">Self-Attention</text>
  <rect x="56" y="188" width="112" height="30" rx="6" fill="white" fill-opacity="0.6" stroke="#34d399" stroke-width="1"/>
  <text x="112" y="208" font-size="11" fill="#065f46" text-anchor="middle">Feed-Forward</text>
  <rect x="56" y="226" width="112" height="30" rx="6" fill="white" fill-opacity="0.6" stroke="#34d399" stroke-width="1"/>
  <text x="112" y="246" font-size="11" fill="#065f46" text-anchor="middle">LayerNorm</text>

  <text x="112" y="290" font-size="11" fill="#047857" text-anchor="middle">→ full token sequence</text>
  <text x="112" y="308" font-size="11" fill="#047857" text-anchor="middle">for cross-attention</text>
  <text x="112" y="326" font-size="11" fill="#047857" text-anchor="middle">→ CLS for ITC</text>
  <text x="112" y="348" font-size="11" fill="#047857" text-anchor="middle">Trained by ALL 3 heads</text>

  <!-- image thumbnail -->
  <rect x="58" y="398" width="108" height="70" rx="8" fill="#bae6fd" stroke="#38bdf8" stroke-width="1.5"/>
  <ellipse cx="88" cy="418" rx="12" ry="12" fill="#fde68a"/>
  <path d="M60,462 Q88,430 116,462Z" fill="#4ade80"/>
  <path d="M106,462 Q124,440 152,462Z" fill="#22c55e"/>
  <line x1="112" y1="380" x2="112" y2="395" stroke="#555" stroke-width="1.8" marker-end="url(#ah)"/>

  <!-- ── shared image feature bus ── -->
  <line x1="192" y1="230" x2="1020" y2="230" stroke="#0284c7" stroke-width="2.5"/>
  <rect x="210" y="214" width="140" height="26" rx="6" fill="#e0f2fe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="280" y="231" font-size="11" font-weight="700" fill="#0369a1" text-anchor="middle">shared image features</text>
  <line x1="192" y1="230" x2="192" y2="230" stroke="#059669" stroke-width="2"/>
  <line x1="192" y1="200" x2="192" y2="244" stroke="#059669" stroke-width="2.5" marker-end="url(#ah_b)"/>

  <!-- ──────────────────────────────────────────
       COLUMN A: BERT Text Encoder + ITC
  ────────────────────────────────────────── -->
  <!-- ITC head badge -->
  <rect x="364" y="78" width="62" height="30" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="395" y="98" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">ITC</text>

  <!-- BERT encoder box -->
  <rect x="340" y="120" width="110" height="220" rx="10" fill="url(#gPurple)" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
  <text x="395" y="148" font-size="12" font-weight="700" fill="#3b0764" text-anchor="middle">BERT</text>
  <text x="395" y="164" font-size="12" font-weight="700" fill="#3b0764" text-anchor="middle">Text Encoder</text>
  <text x="378" y="185" font-size="10" fill="#6d28d9">N×</text>
  <rect x="354" y="178" width="82" height="26" rx="5" fill="white" fill-opacity="0.6" stroke="#a78bfa" stroke-width="1"/>
  <text x="395" y="195" font-size="10" fill="#4c1d95" text-anchor="middle">Self-Attention</text>
  <rect x="354" y="210" width="82" height="26" rx="5" fill="white" fill-opacity="0.6" stroke="#a78bfa" stroke-width="1"/>
  <text x="395" y="227" font-size="10" fill="#4c1d95" text-anchor="middle">Feed-Forward</text>
  <text x="395" y="268" font-size="10" fill="#6d28d9" text-anchor="middle">pool at &lt;eos&gt;</text>
  <text x="395" y="284" font-size="10" fill="#6d28d9" text-anchor="middle">→ text embedding</text>
  <text x="395" y="300" font-size="10" fill="#6d28d9" text-anchor="middle">compare to CLS</text>
  <text x="395" y="316" font-size="10" fill="#6d28d9" text-anchor="middle">symmetric NCE</text>

  <!-- ITC link up to badge -->
  <line x1="395" y1="120" x2="395" y2="108" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- ITC link right to image bus -->
  <line x1="450" y1="230" x2="395" y2="230" stroke="#0284c7" stroke-width="1.8" stroke-dasharray="5 3" marker-end="url(#ah_b2)"/>

  <!-- ──────────────────────────────────────────
       COLUMN B: Image-Grounded Text Encoder + ITM
  ────────────────────────────────────────── -->
  <!-- ITM badge -->
  <rect x="618" y="78" width="62" height="30" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="649" y="98" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">ITM</text>

  <!-- grounded encoder box -->
  <rect x="594" y="120" width="110" height="240" rx="10" fill="url(#gPurple)" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
  <text x="649" y="144" font-size="11" font-weight="700" fill="#3b0764" text-anchor="middle">Image-Grounded</text>
  <text x="649" y="160" font-size="11" font-weight="700" fill="#3b0764" text-anchor="middle">Text Encoder</text>
  <rect x="606" y="168" width="86" height="24" rx="5" fill="white" fill-opacity="0.6" stroke="#a78bfa" stroke-width="1"/>
  <text x="649" y="184" font-size="10" fill="#4c1d95" text-anchor="middle">Self-Attention</text>
  <!-- cross attn block (highlighted) -->
  <rect x="606" y="198" width="86" height="28" rx="5" fill="#bfdbfe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="649" y="217" font-size="10" font-weight="600" fill="#1e40af" text-anchor="middle">Cross-Attention</text>
  <text x="649" y="230" font-size="9" fill="#1e3a8a" text-anchor="middle">← image features</text>
  <rect x="606" y="232" width="86" height="24" rx="5" fill="white" fill-opacity="0.6" stroke="#a78bfa" stroke-width="1"/>
  <text x="649" y="248" font-size="10" fill="#4c1d95" text-anchor="middle">Feed-Forward</text>

  <text x="649" y="285" font-size="10" fill="#6d28d9" text-anchor="middle">binary classifier</text>
  <text x="649" y="299" font-size="10" fill="#6d28d9" text-anchor="middle">match / no-match</text>
  <text x="649" y="313" font-size="10" fill="#6d28d9" text-anchor="middle">on &lt;bos&gt; position</text>
  <rect x="610" y="324" width="78" height="26" rx="6" fill="#fef9c3" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="649" y="341" font-size="11" font-weight="700" fill="#713f12" text-anchor="middle">Binary Head</text>

  <!-- ITM link up -->
  <line x1="649" y1="120" x2="649" y2="108" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- cross-attn draws from bus -->
  <line x1="649" y1="213" x2="649" y2="230" stroke="#0284c7" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ah_b)"/>
  <line x1="704" y1="230" x2="649" y2="230" stroke="#0284c7" stroke-width="2" stroke-dasharray="5 3"/>

  <!-- hard negative note -->
  <rect x="580" y="468" width="138" height="46" rx="8" fill="#fff7ed" stroke="#fed7aa" stroke-width="1.2"/>
  <text x="649" y="488" font-size="10" font-weight="600" fill="#9a3412" text-anchor="middle">Hard Negatives</text>
  <text x="649" y="502" font-size="10" fill="#c2410c" text-anchor="middle">mined from ITC sims</text>
  <line x1="649" y1="468" x2="649" y2="350" stroke="#f59e0b" stroke-width="1" stroke-dasharray="3 3" marker-end="url(#ah)"/>

  <!-- ──────────────────────────────────────────
       COLUMN C: Image-Grounded Text Decoder + LM
  ────────────────────────────────────────── -->
  <!-- LM badge -->
  <rect x="870" y="78" width="62" height="30" rx="8" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/>
  <text x="901" y="98" font-size="14" font-weight="700" fill="#92400e" text-anchor="middle">LM</text>

  <!-- grounded decoder box -->
  <rect x="846" y="120" width="130" height="280" rx="10" fill="url(#gPurple)" stroke="#7c3aed" stroke-width="2" filter="url(#sh)"/>
  <text x="911" y="144" font-size="11" font-weight="700" fill="#3b0764" text-anchor="middle">Image-Grounded</text>
  <text x="911" y="160" font-size="11" font-weight="700" fill="#3b0764" text-anchor="middle">Text Decoder</text>
  <rect x="858" y="166" width="106" height="24" rx="5" fill="white" fill-opacity="0.6" stroke="#a78bfa" stroke-width="1"/>
  <text x="911" y="182" font-size="10" fill="#4c1d95" text-anchor="middle">Causal Self-Attention</text>
  <rect x="858" y="196" width="106" height="28" rx="5" fill="#bfdbfe" stroke="#0284c7" stroke-width="1.5"/>
  <text x="911" y="214" font-size="10" font-weight="600" fill="#1e40af" text-anchor="middle">Cross-Attention</text>
  <text x="911" y="227" font-size="9" fill="#1e3a8a" text-anchor="middle">← image features</text>
  <rect x="858" y="230" width="106" height="24" rx="5" fill="white" fill-opacity="0.6" stroke="#a78bfa" stroke-width="1"/>
  <text x="911" y="246" font-size="10" fill="#4c1d95" text-anchor="middle">Feed-Forward</text>

  <text x="911" y="278" font-size="10" fill="#6d28d9" text-anchor="middle">teacher-forcing</text>
  <text x="911" y="292" font-size="10" fill="#6d28d9" text-anchor="middle">predict next token</text>
  <text x="911" y="306" font-size="10" fill="#6d28d9" text-anchor="middle">cross-entropy loss</text>

  <!-- generate output -->
  <rect x="858" y="330" width="106" height="58" rx="6" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="911" y="350" font-size="10" font-weight="600" fill="#14532d" text-anchor="middle">generate()</text>
  <text x="911" y="365" font-size="9" fill="#15803d" text-anchor="middle">greedy decode</text>
  <text x="911" y="379" font-size="9" fill="#15803d" text-anchor="middle">caption string</text>

  <!-- LM link up -->
  <line x1="901" y1="120" x2="901" y2="108" stroke="#f59e0b" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- cross-attn draws from bus -->
  <line x1="960" y1="230" x2="911" y2="230" stroke="#0284c7" stroke-width="2" stroke-dasharray="5 3"/>
  <line x1="911" y1="213" x2="911" y2="230" stroke="#0284c7" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#ah_b)"/>

  <!-- ── caption input flowing to all text towers ── -->
  <rect x="340" y="440" width="636" height="42" rx="8" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5"/>
  <text x="400" y="460" font-size="11" fill="#6b21a8" font-style="italic">input caption:</text>
  <text x="500" y="460" font-size="13" font-family="monospace" fill="#3b0764">"[CLS]  a little girl holding a kitten  [EOS]"</text>
  <line x1="395" y1="440" x2="395" y2="340" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="649" y1="440" x2="649" y2="400" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ah)"/>
  <line x1="901" y1="440" x2="901" y2="400" stroke="#7c3aed" stroke-width="1.4" marker-end="url(#ah)"/>

  <!-- ── total loss banner ── -->
  <rect x="32" y="542" width="996" height="64" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="52" y="567" font-size="13" font-weight="700" fill="#3730a3">Total Loss  =  ITC  +  ITM  +  LM</text>
  <text x="52" y="588" font-size="11" font-family="monospace" fill="#1e1b4b">ITC: symmetric InfoNCE on (CLS, text_pool)  ·  ITM: BCE on grounded-encoder BOS, hard-negatives mined from ITC  ·  LM: teacher-force CE</text>
</svg>
