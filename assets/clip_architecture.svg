<svg viewBox="0 0 960 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <style>
      .title{fill:#0f172a;font-size:27px;font-weight:700;}
      .sub{fill:#64748b;font-size:14px;}
      .encV{fill:#d1fae5;stroke:#059669;stroke-width:2;}
      .encT{fill:#ede9fe;stroke:#7c3aed;stroke-width:2;}
      .encLbl{fill:#0f172a;font-size:15px;font-weight:600;text-anchor:middle;}
      .encSub{fill:#475569;font-size:11px;text-anchor:middle;}
      .chipV{fill:#a7f3d0;stroke:#059669;stroke-width:1.5;}
      .chipT{fill:#ddd6fe;stroke:#7c3aed;stroke-width:1.5;}
      .chipTx{fill:#0f172a;font-size:13px;font-weight:600;text-anchor:middle;}
      .cell{fill:#f1f5f9;stroke:#cbd5e1;stroke-width:1;}
      .cellPos{fill:#fde68a;stroke:#f59e0b;stroke-width:1.6;}
      .panel{fill:#ffffff;stroke:#e2e8f0;stroke-width:1.5;}
      .mono{font-family:ui-monospace,Menlo,Consolas,monospace;fill:#334155;font-size:13px;}
      .ar{stroke:#475569;stroke-width:1.8;fill:none;}
      .note{fill:#334155;font-size:14px;}
      .small{font-size:11px;fill:#64748b;}
    </style>
  </defs>
  <rect x="0" y="0" width="960" height="560" rx="16" fill="#f8fafc"/>
  <text x="40" y="48" class="title">CLIP &#8212; Contrastive Pre-training</text>
  <text x="40" y="72" class="sub">Each batch of N (image, caption) pairs trains the encoders to agree on the diagonal</text>

  <!-- caption input -->
  <rect x="300" y="126" width="190" height="44" rx="8" class="panel"/>
  <text x="314" y="153" class="mono">"a dog on the grass"</text>
  <path d="M490,148 L516,148" class="ar" marker-end="url(#arr)"/>

  <!-- Text encoder -->
  <rect x="520" y="118" width="150" height="60" rx="10" class="encT"/>
  <text x="595" y="144" class="encLbl">Text Encoder</text>
  <text x="595" y="162" class="encSub">Transformer &#183; pool at &lt;eos&gt;</text>

  <!-- fan to T chips -->
  <path d="M595,178 L519,202" class="ar" marker-end="url(#arr)"/>
  <path d="M595,178 L577,202" class="ar" marker-end="url(#arr)"/>
  <path d="M595,178 L635,202" class="ar" marker-end="url(#arr)"/>
  <path d="M595,178 L693,202" class="ar" marker-end="url(#arr)"/>

  <!-- T chips -->
  <rect x="490" y="204" width="58" height="28" rx="6" class="chipT"/><text x="519" y="223" class="chipTx">T&#8321;</text>
  <rect x="548" y="204" width="58" height="28" rx="6" class="chipT"/><text x="577" y="223" class="chipTx">T&#8322;</text>
  <rect x="606" y="204" width="58" height="28" rx="6" class="chipT"/><text x="635" y="223" class="chipTx">T&#8323;</text>
  <rect x="664" y="204" width="58" height="28" rx="6" class="chipT"/><text x="693" y="223" class="chipTx">T&#8324;</text>

  <!-- image input -->
  <rect x="170" y="360" width="70" height="70" rx="8" fill="#bae6fd" stroke="#0284c7" stroke-width="1.5"/>
  <circle cx="190" cy="382" r="8" fill="#fde047"/>
  <path d="M174,424 L196,398 L210,414 L226,392 L236,424 Z" fill="#22c55e"/>
  <path d="M240,395 L296,395" class="ar" marker-end="url(#arr)"/>

  <!-- Image encoder -->
  <rect x="300" y="360" width="120" height="68" rx="10" class="encV"/>
  <text x="360" y="388" class="encLbl">Image Encoder</text>
  <text x="360" y="406" class="encSub">ViT &#183; CLS token</text>

  <!-- fan to I chips -->
  <path d="M420,394 L430,269" class="ar" marker-end="url(#arr)"/>
  <path d="M420,394 L430,315" class="ar" marker-end="url(#arr)"/>
  <path d="M420,394 L430,361" class="ar" marker-end="url(#arr)"/>
  <path d="M420,394 L430,407" class="ar" marker-end="url(#arr)"/>

  <!-- I chips -->
  <rect x="432" y="246" width="52" height="46" rx="6" class="chipV"/><text x="458" y="274" class="chipTx">I&#8321;</text>
  <rect x="432" y="292" width="52" height="46" rx="6" class="chipV"/><text x="458" y="320" class="chipTx">I&#8322;</text>
  <rect x="432" y="338" width="52" height="46" rx="6" class="chipV"/><text x="458" y="366" class="chipTx">I&#8323;</text>
  <rect x="432" y="384" width="52" height="46" rx="6" class="chipV"/><text x="458" y="412" class="chipTx">I&#8324;</text>

  <!-- similarity matrix 4x4 -->
  <g>
    <!-- row 0 -->
    <rect x="490" y="246" width="58" height="46" class="cellPos"/><rect x="548" y="246" width="58" height="46" class="cell"/><rect x="606" y="246" width="58" height="46" class="cell"/><rect x="664" y="246" width="58" height="46" class="cell"/>
    <!-- row 1 -->
    <rect x="490" y="292" width="58" height="46" class="cell"/><rect x="548" y="292" width="58" height="46" class="cellPos"/><rect x="606" y="292" width="58" height="46" class="cell"/><rect x="664" y="292" width="58" height="46" class="cell"/>
    <!-- row 2 -->
    <rect x="490" y="338" width="58" height="46" class="cell"/><rect x="548" y="338" width="58" height="46" class="cell"/><rect x="606" y="338" width="58" height="46" class="cellPos"/><rect x="664" y="338" width="58" height="46" class="cell"/>
    <!-- row 3 -->
    <rect x="490" y="384" width="58" height="46" class="cell"/><rect x="548" y="384" width="58" height="46" class="cell"/><rect x="606" y="384" width="58" height="46" class="cell"/><rect x="664" y="384" width="58" height="46" class="cellPos"/>
  </g>
  <!-- legend -->
  <rect x="760" y="250" width="18" height="18" rx="3" class="cellPos"/>
  <text x="786" y="264" class="small">matching pair &#8594; pull together</text>
  <rect x="760" y="278" width="18" height="18" rx="3" class="cell"/>
  <text x="786" y="292" class="small">mismatch &#8594; push apart</text>

  <!-- loss note -->
  <rect x="40" y="470" width="880" height="64" rx="10" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1.2"/>
  <text x="60" y="498" class="note" font-weight="600">Symmetric InfoNCE</text>
  <text x="60" y="520" class="mono">logits = exp(&#964;) &#183; sim ;  loss = &#189;&#183;CE(rows, diag) + &#189;&#183;CE(cols, diag) &#8212; maximize the N matching pairs, minimize the N&#178;&#8211;N mismatches</text>
</svg>
